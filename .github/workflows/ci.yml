name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: research
          POSTGRES_USER: research
          POSTGRES_PASSWORD: research
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U research -d research"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      qdrant:
        image: qdrant/qdrant:v1.12.5
        ports:
          - 6333:6333
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Compile backend
        run: python -m compileall backend/app backend/tests
      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg://research:research@127.0.0.1:5432/research
          REDIS_URL: redis://127.0.0.1:6379/0
          QDRANT_URL: http://127.0.0.1:6333
          RUN_INTEGRATION_TESTS: "1"
        run: python -m unittest discover tests

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose config
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml config --quiet
      - name: Build backend image
        run: docker build -t research-assistant-backend ./backend
      - name: Build frontend image
        run: docker build -t research-assistant-frontend ./frontend
